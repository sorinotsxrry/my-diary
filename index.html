<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 플래너</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #f7f6f3;
            --card-bg: #ffffff;
            --text-main: #3c3530;
            --text-muted: #8a8279;
            --accent-color: #bfa18f;
            --border-radius: 24px;
            
            /* 감정별 색상 정의 */
            --mood-happy: #ffead0;
            --mood-sad: #d4e4ed;
            --mood-angry: #f9d8d6;
            --mood-calm: #e2f0d9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; color: var(--text-main); }
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; }
        
        .content-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-panel { width: 100%; max-width: 600px; display: none; }
        .tab-panel.active { display: block; }

        /* 1. 박스 프레임을 없애고 선(Line)으로 달력 구획 나누기 */
        .calendar-container { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #e3ded8; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background-color: #e3ded8; gap: 1px; } /* gap을 이용해 선 구현 */
        .day-cell { 
            background: #fff; padding: 8px 4px; 
            aspect-ratio: 1 / 1.3; /* 세로형 스티커 공간 확보 */
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .day-cell:hover { background-color: #faf9f7; }

        /* 띠부띠부 스티커 효과 */
        .sticker-img-container { position: absolute; bottom: 4px; width: 85%; height: 65%; }
        .sticker-img { 
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(1.5px 0 0 #fff) drop-shadow(-1.5px 0 0 #fff) drop-shadow(0 1.5px 0 #fff) drop-shadow(0 -1.5px 0 #fff) drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }

        /* 사진 추가 버튼 */
        .file-uploader {
            display: block; padding: 15px; background: #fcfbfa; border: 2px dashed #eae7e4;
            border-radius: 14px; text-align: center; cursor: pointer; color: var(--text-muted);
            margin-top: 5px; margin-bottom: 15px;
        }

        /* 2. 감정 선택 옵션에 색상 적용 */
        .mood-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mood-option {
            flex: 1; padding: 12px; text-align: center; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 500; border: 2px solid transparent; transition: 0.2s;
        }
        .mood-option.happy { background-color: var(--mood-happy); }
        .mood-option.sad { background-color: var(--mood-sad); }
        .mood-option.angry { background-color: var(--mood-angry); }
        .mood-option.calm { background-color: var(--mood-calm); }

        /* 선택된 감정 강조 */
        .mood-option input[type="radio"] { display: none; }
        .mood-option input[type="radio"]:checked + span { font-weight: bold; }
        .mood-option.selected { border-color: var(--text-main); }
    </style>
</head>
<body>
    <div class="content-container">
        
        <!-- 메인 달력 패널 -->
        <div id="panel-calendar" class="tab-panel active">
            <h2 style="margin-bottom: 15px;">2026년 7월</h2>
            <div class="calendar-container">
                <div class="calendar-grid">
                    <!-- 예시 날짜 칸 (선으로 분할된 형태) -->
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">1</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">2</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">3</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">4</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">5</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">6</span>
                    </div>
                    <div class="day-cell">
                        <span style="font-size: 12px; color: var(--text-muted);">7</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 다이어리 입력 패널 -->
        <div id="panel-write" class="tab-panel">
            <h2 style="margin-bottom: 20px;">기록하기</h2>
            
            <!-- 감정 선택 옵션 (색상 적용) -->
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">오늘의 기분</label>
            <div class="mood-selector">
                <label class="mood-option happy" onclick="selectMood(this)">
                    <input type="radio" name="mood" value="happy"> <span>😊 기쁨</span>
                </label>
                <label class="mood-option sad" onclick="selectMood(this)">
                    <input type="radio" name="mood" value="sad"> <span>💧 슬픔</span>
                </label>
                <label class="mood-option angry" onclick="selectMood(this)">
                    <input type="radio" name="mood" value="angry"> <span>🔥 짜증</span>
                </label>
                <label class="mood-option calm" onclick="selectMood(this)">
                    <input type="radio" name="mood" value="calm"> <span>🌿 평온</span>
                </label>
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">사진 추가</label>
                <label for="file-input" class="file-uploader" id="upload-label">
                    사진 추가
                </label>
                <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="previewImage(event)">
                <img id="img-preview" style="max-width: 100px; display: none; margin-top: 10px; border-radius: 8px;">
            </div>
            
            <button onclick="saveData()" style="width: 100%; padding: 15px; margin-top: 20px; background: var(--text-main); color: #fff; border: none; border-radius: 12px; cursor: pointer;">저장하기</button>
        </div>
    </div>

    <script>
        // 감정 선택 시 테두리 및 스타일 처리 스크립트
        function selectMood(element) {
            document.querySelectorAll('.mood-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            const radio = element.querySelector('input[type="radio"]');
            radio.checked = true;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('img-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('upload-label').innerText = "사진 추가 완료";
                };
                reader.readAsDataURL(file);
            }
        }
        function saveData() { alert("저장되었습니다."); }
    </script>
</body>
</html>
