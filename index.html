<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다꾸 감성 통합 플래너</title>
    <style>
        :root {
            --bg-color: #f7f6f3; /* 부드러운 크림색 배경 */
            --card-bg: #ffffff;
            --text-main: #3c3530; /* 부드러운 다크 브라운 텍스트 */
            --text-muted: #8a8279;
            --accent-color: #bfa18f; /* 베이지 포인트 */
            --border-radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', AppleSDGothicNeo-Medium, sans-serif;
            color: var(--text-main);
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: row; /* 기본 PC 레이아웃: 가로 배치 */
            height: 100vh;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* 왼쪽: 다이어리 작성 공간 */
        .sidebar {
            width: 380px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* 날씨와 온도를 한 줄에 배치 */
        .weather-temp-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            background: #fdfdfd;
            border: 1px solid #eae7e4;
            border-radius: 14px;
            font-size: 0.9rem;
            outline: none;
        }

        .file-uploader {
            display: block;
            padding: 15px;
            background: #fcfbfa;
            border: 2px dashed #eae7e4;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .img-preview {
            max-width: 120px;
            max-height: 120px;
            border-radius: 12px;
            object-fit: cover;
            display: none;
        }

        button.btn-save {
            width: 100%;
            padding: 14px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* 오른쪽: 메인 캘린더 화면 */
        .main-content {
            flex: 1;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .calendar-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .calendar-header p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 달력 그리드 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .day-label {
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-muted);
            padding-bottom: 10px;
        }

        .day-cell {
            background: #fdfdfd;
            border: 1px solid #f2effc;
            border-radius: 18px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            aspect-ratio: 1 / 1; 
            min-height: 60px;
            position: relative;
            transition: background-color 0.2s ease;
        }

        .day-cell.today {
            border: 2px solid var(--accent-color);
        }

        .day-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 2px;
        }

        .sticker-img {
            width: 80%;
            height: 80%;
            max-width: 45px;
            max-height: 45px;
            object-fit: cover;
            border-radius: 8px;
            border: 1.5px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .memo-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #eae7e4;
        }

        /* 모바일 반응형 설정 */
        @media (max-width: 768px) {
            body {
                flex-direction: column; 
                height: auto;
                overflow: auto;
                padding: 10px;
                gap: 15px;
            }

            .sidebar {
                width: 100%; 
                order: 2; 
                padding: 20px;
                border-radius: 20px;
            }

            .main-content {
                width: 100%;
                order: 1; 
                padding: 20px;
                border-radius: 20px;
            }

            .calendar-header h1 {
                font-size: 1.8rem;
            }

            .calendar-grid {
                gap: 6px; 
            }

            .day-cell {
                padding: 4px;
            }

            .day-number {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="form-group">
            <label>📸 오늘의 스티커</label>
            <label for="file-input" class="file-uploader" id="upload-label">
                이곳을 눌러 사진을 올려보세요
            </label>
            <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
            <div class="preview-container">
                <img id="img-preview" class="img-preview" src="">
            </div>
        </div>

        <div class="form-group weather-temp-group">
            <div>
                <label>☀️ 날씨</label>
                <select id="diary-weather">
                    <option value="☀️ 맑음">☀️ 맑음</option>
                    <option value="☁️ 흐림">☁️ 흐림</option>
                    <option value="🌧️ 비">🌧️ 비</option>
                    <option value="❄️ 눈">❄️ 눈</option>
                </select>
            </div>
            <div>
                <label>🌡️ 온도 (°C)</label>
                <input type="number" id="diary-temp" placeholder="예: 24">
            </div>
        </div>

        <div class="form-group">
            <label>📍 장소</label>
            <input type="text" id="diary-place" placeholder="예: 어린이대공원, 00카페">
        </div>

        <div class="form-group">
            <label>🥰 감정</label>
            <select id="diary-emotion">
                <option value="즐거움">즐거움 (연주황)</option>
                <option value="평온">평온 (연연두)</option>
                <option value="슬픔">슬픔 (연하늘)</option>
                <option value="분노">분노 (연분홍)</option>
            </select>
        </div>

        <div class="form-group">
            <label>💖 감사 일기 & 메모</label>
            <textarea id="diary-content" rows="5" placeholder="오늘 하루 감사했던 일이나 기록을 남겨보세요."></textarea>
        </div>

        <button class="btn-save" onclick="saveData()">다이어리 저장하기</button>

        <div class="memo-box">
            <label>📌 한 줄 메모장</label>
            <input type="text" id="quick-memo" placeholder="잊지 말아야 할 메모를 적고 엔터" onkeypress="addQuickMemo(event)">
            <div id="memo-list" style="font-size: 0.85rem; color: #777; margin-top: 8px; line-height: 1.6;"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="calendar-header">
            <h1>Today</h1>
            <p>Wed, Jul 15, 2026</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-bottom: 5px; text-align: center;">
            <div class="day-label">Sun</div>
            <div class="day-label">Mon</div>
            <div class="day-label">Tue</div>
            <div class="day-label">Wed</div>
            <div class="day-label">Thu</div>
            <div class="day-label">Fri</div>
            <div class="day-label">Sat</div>
        </div>

        <div class="calendar-grid" id="calendar-days"></div>
    </div>

    <script>
        let selectedDateStr = "2026-07-15"; 
        let base64ImageStr = ""; 

        let plannerData = JSON.parse(localStorage.getItem('plannerData')) || {};
        let quickMemos = JSON.parse(localStorage.getItem('quickMemos')) || [];

        // 감정별 배경색 컬러 맵 (파스텔톤)
        const emotionColors = {
            '즐거움': '#ffe8cc', // 연주황
            '평온': '#e2f6e2',   // 연연두
            '슬픔': '#e7f5ff',   // 연하늘
            '분노': '#fff0f6'    // 연분홍
        };

        window.onload = function() {
            renderCalendar();
            renderMemos();
            loadDayData(selectedDateStr);
        };

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64ImageStr = e.target.result;
                    const preview = document.getElementById('img-preview');
                    preview.src = base64ImageStr;
                    preview.style.display = 'inline-block';
                    document.getElementById('upload-label').innerText = "✅ 사진 선택 완료";
                }
                reader.readAsDataURL(file);
            }
        }

        function renderCalendar() {
            const calendarDays = document.getElementById('calendar-days');
            calendarDays.innerHTML = '';

            for(let i=0; i<3; i++) {
                const blank = document.createElement('div');
                blank.style.visibility = 'hidden';
                calendarDays.appendChild(blank);
            }

            for(let day=1; day<=31; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.classList.add('day-cell');
                
                const dateStr = `2026-07-${String(day).padStart(2, '0')}`;
                if(dateStr === "2026-07-15") dayDiv.classList.add('today');

                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;

                // 기록된 감정이 있으면 일자 칸 배경색 바꾸기
                if(plannerData[dateStr]) {
                    const emotion = plannerData[dateStr].emotion;
                    if(emotion && emotionColors[emotion]) {
                        dayDiv.style.backgroundColor = emotionColors[emotion];
                    }
                    
                    // 사진 스티커가 있다면 달력에 표시!
                    if(plannerData[dateStr].image) {
                        const img = document.createElement('img');
                        img.src = plannerData[dateStr].image;
                        img.classList.add('sticker-img');
                        dayDiv.appendChild(img);
                    }
                }

                dayDiv.addEventListener('click', () => {
                    selectedDateStr = dateStr;
                    // 메인 화면의 일 선택자 정보를 업데이트해줍니다.
                    document.querySelector('.calendar-header p').innerText = `Selected: 2026년 7월 ${day}일`;
                    loadDayData(selectedDateStr);
                    
                    if(window.innerWidth <= 768) {
                        document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });
                    }
                });

                calendarDays.appendChild(dayDiv);
            }
        }

        function loadDayData(dateStr) {
            const data = plannerData[dateStr];
            const preview = document.getElementById('img-preview');
            
            if(data) {
                document.getElementById('diary-weather').value = data.weather || '☀️ 맑음';
                document.getElementById('diary-temp').value = data.temp || '';
                document.getElementById('diary-place').value = data.place || '';
                document.getElementById('diary-emotion').value = data.emotion || '즐거움';
                document.getElementById('diary-content').value = data.content || '';
                if(data.image) {
                    base64ImageStr = data.image;
                    preview.src = data.image;
                    preview.style.display = 'inline-block';
                    document.getElementById('upload-label').innerText = "✅ 등록된 사진 있음";
                } else {
                    clearImage();
                }
            } else {
                document.getElementById('diary-weather').value = '☀️ 맑음';
                document.getElementById('diary-temp').value = '';
                document.getElementById('diary-place').value = '';
                document.getElementById('diary-emotion').value = '즐거움';
                document.getElementById('diary-content').value = '';
                clearImage();
            }
        }

        function clearImage() {
            base64ImageStr = "";
            document.getElementById('img-preview').style.display = 'none';
            document.getElementById('upload-label').innerText = "이곳을 눌러 사진을 올려보세요";
            document.getElementById('file-input').value = "";
        }

        function saveData() {
            plannerData[selectedDateStr] = {
                image: base64ImageStr,
                weather: document.getElementById('diary-weather').value,
                temp: document.getElementById('diary-temp').value,
                place: document.getElementById('diary-place').value,
                emotion: document.getElementById('diary-emotion').value,
                content: document.getElementById('diary-content').value
            };

            localStorage.setItem('plannerData', JSON.stringify(plannerData));
            alert("다이어리가 정상적으로 저장되어 달력에 반영되었습니다! ✨");
            renderCalendar();
        }

        function addQuickMemo(event) {
            if(event.key === 'Enter') {
                const input = document.getElementById('quick-memo');
                if(input.value.trim() === "") return;
                
                quickMemos.push(input.value.trim());
                localStorage.setItem('quickMemos', JSON.stringify(quickMemos));
                input.value = "";
                renderMemos();
            }
        }

        function renderMemos() {
            const list = document.getElementById('memo-list');
            list.innerHTML = quickMemos.map((m, idx) => `<div>• ${m} <span style="cursor:pointer;color:red;margin-left:5px;" onclick="deleteMemo(${idx})">x</span></div>`).join('');
        }

        function deleteMemo(idx) {
            quickMemos.splice(idx, 1);
            localStorage.setItem('quickMemos', JSON.stringify(quickMemos));
            renderMemos();
        }
    </script>
</body>
</html>
